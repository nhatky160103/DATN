services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  triton:
    image: nvcr.io/nvidia/tritonserver:24.04-py3
    restart: unless-stopped
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=true
      --log-info=true
    volumes:
      - ../triton_model_repository:/models:ro
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

  frame-reader:
    build:
      context: ..
      dockerfile: Dockerfile.cpu
    restart: unless-stopped
    command: python -m attendance_pipeline.frame_reader --config config.yaml --camera-id camera-01
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      CAMERA_SOURCE: ${CAMERA_SOURCE}
    volumes:
      - ../config.yaml:/app/config.yaml:ro

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.cpu
    restart: unless-stopped
    command: python -m attendance_pipeline.worker --config config.yaml
    depends_on:
      - redis
      - triton
    environment:
      REDIS_URL: redis://redis:6379/0
      TRITON_URL: triton:8000
      TRITON_ENABLED: "true"
      BUCKET_NAME: ${BUCKET_NAME:-Hust}
    volumes:
      - ..:/app

  api:
    build:
      context: ..
      dockerfile: Dockerfile.cpu
    restart: unless-stopped
    command: gunicorn -b 0.0.0.0:5000 attendance_pipeline.api:app
    depends_on:
      - redis
      - worker
    environment:
      REDIS_URL: redis://redis:6379/0
      BUCKET_NAME: ${BUCKET_NAME:-Hust}
    volumes:
      - ..:/app
    ports:
      - "5000:5000"
